<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/alfred-logo-transparent.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfred</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d1114;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(145deg, rgba(47, 146, 171, 0.12), transparent 42%),
          linear-gradient(180deg, #11191d, #0d1114 48%, #090c0e);
      }

      .boot {
        display: grid;
        min-height: 100vh;
        place-items: center;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        color: #f2f7f8;
      }

      .boot__card {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 26px 30px;
        background: rgba(26, 36, 41, 0.76);
        border: 1px solid rgba(221, 243, 248, 0.12);
        border-radius: 6px;
        box-shadow: 0 24px 70px rgba(3, 12, 18, 0.38);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
        backdrop-filter: blur(18px) saturate(1.2);
      }

      .boot__mark {
        width: 42px;
        height: 42px;
        filter: drop-shadow(0 0 18px rgba(57, 174, 199, 0.34));
      }

      .boot__title {
        margin: 0;
        font-size: 1.12rem;
        font-weight: 750;
      }

      .boot__caption {
        margin: 0;
        color: #9cabb0;
        font-size: 0.84rem;
      }

      .boot__dots {
        display: inline-flex;
        gap: 5px;
      }

      .boot__dots span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #43bed5;
        animation: boot-dot 1.2s ease-in-out infinite;
      }

      .boot__dots span:nth-child(2) {
        animation-delay: 0.16s;
      }

      .boot__dots span:nth-child(3) {
        animation-delay: 0.32s;
      }

      @keyframes boot-dot {
        0%,
        70%,
        100% {
          opacity: 0.28;
          transform: translateY(0);
        }
        35% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="boot" role="status" aria-live="polite">
        <div class="boot__card">
          <img class="boot__mark" src="/brand/alfred-logo-transparent.png" alt="" />
          <p class="boot__title">Starting Alfred</p>
          <p class="boot__caption">Connecting the local client.</p>
          <span class="boot__dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
