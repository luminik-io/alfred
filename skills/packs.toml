# Curated skill packs for the alfred-os fleet.
#
# Each [[pack]] describes one installable skill bundle: where it comes from, its
# license, how it installs, and which agent roles get it by default. The
# `alfred skills` CLI reads this manifest.
#
# install = "vendored"  -> the skill is copied into this repo under `skills/vendored/<path>`.
#                          Install copies it to the Claude Code skills dir. No network.
# install = "fetch"     -> the skill is NOT in this repo. Install runs `fetch_cmd`
#                          to pull it from `source` at install time (network required).
#
# roles are the agent codenames' role identifiers (feature-dev, pr-review,
# bug-triage, test-coverage, review-fix, deploy-monitor, e2e-smoke). A role in
# `roles` means the pack is recommended-by-default for that role. The CLI never
# auto-installs; roles drive documentation and `--role` filtering only.

schema_version = 1

# --------------------------------------------------------------------------
# Vendored packs (MIT, copied into this repo with attribution intact)
# --------------------------------------------------------------------------

