# --------------------------------------------------------------------------
# Reference-install packs (fetched from source at install time)
# --------------------------------------------------------------------------

[[pack]]
name = "gstack"
summary = "CLI-first headless-browser QA, review, and ship skills (installs a directory of subskills)."
source = "https://github.com/garrytan/gstack"
ref = "main"
license = "MIT"
attribution = "Copyright (c) 2026 Garry Tan"
install = "fetch"
# gstack ships its own setup that clones into the skills dir and symlinks each
# subskill up to a top-level name. {skills_dir} is expanded by the CLI.
fetch_cmd = "git clone --depth 1 https://github.com/garrytan/gstack.git {skills_dir}/gstack && cd {skills_dir}/gstack && ./setup"
reference_reason = "Large interdependent skill set plus a Bun/TypeScript browse daemon; upstream setup handles platform-specific symlinking."
roles = ["e2e-smoke", "pr-review", "bug-triage"]

[[pack]]
name = "headroom"
summary = "Opt-in token/context compression (Apache-2.0). Reference-install; see docs/SKILLS.md."
source = "https://github.com/headroomlabs-ai/headroom"
ref = "main"
license = "Apache-2.0"
attribution = "Copyright 2025 Headroom Contributors"
install = "fetch"
# Headroom is a Python/TS package, not a Claude Code skill. Install pins the
# released library so the framework can call it as an opt-in compression step.
fetch_cmd = "python3 -m pip install 'headroom-ai'"
reference_reason = "Apache-2.0 package carrying a custom ML compression model; pin to a released version rather than vendoring source. Opt-in only."
opt_in = true
roles = []
