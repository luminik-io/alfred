name: External review gate

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: number

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  select:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.prs.outputs.value }}
    steps:
      - name: Select pull requests
        id: prs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR: ${{ inputs.pr }}
          ISSUE_PR: ${{ github.event.issue.number }}
          REVIEW_PR: ${{ github.event.pull_request.number }}
        run: |
          case "$EVENT_NAME" in
            schedule)
              prs="$(gh pr list --repo "$REPO" --state open --limit 100 --json number --jq '[.[].number]')"
              ;;
            workflow_dispatch)
              prs="$(jq -cn --argjson pr "$INPUT_PR" '[$pr]')"
              ;;
            issue_comment)
              prs="$(jq -cn --argjson pr "$ISSUE_PR" '[$pr]')"
              ;;
            *)
              prs="$(jq -cn --argjson pr "$REVIEW_PR" '[$pr]')"
              ;;
          esac
          echo "value=$prs" >> "$GITHUB_OUTPUT"

  evaluate:
    needs: select
    if: needs.select.outputs.prs != '[]'
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJSON(needs.select.outputs.prs) }}
    runs-on: ubuntu-latest
    steps:

      - name: Check out trusted gate implementation
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Evaluate current head
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ matrix.pr }}
        run: |
          head_sha="$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid)"
          test -n "$head_sha"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

          set +e
          output="$(python bin/external-review-gate.py --repo "$REPO" --pr "$PR")"
          code=$?
          set -e

          echo "$output"
          evaluated_sha="$(jq -r '.headSha // empty' <<< "$output")"
          if [ "$code" -eq 0 ] && [ "$evaluated_sha" = "$head_sha" ]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=Greptile and Codex approved exact head; no open threads" >> "$GITHUB_OUTPUT"
          else
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=Exact-head reviews or resolved-thread evidence is incomplete" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish head-bound status
        if: always() && steps.gate.outputs.head_sha
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.gate.outputs.head_sha }}
          STATE: ${{ steps.gate.outputs.state || 'error' }}
          DESCRIPTION: ${{ steps.gate.outputs.description || 'External review evaluation failed' }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          current="$(gh api "repos/$REPO/commits/$SHA/status" \
            --jq '[.statuses[] | select(.context == "External review gate")][0].state // ""')"
          if [ "$current" = "$STATE" ]; then
            echo "External review gate is already $STATE for $SHA"
            exit 0
          fi
          gh api --method POST "repos/$REPO/statuses/$SHA" \
            -f state="$STATE" \
            -f context="External review gate" \
            -f description="$DESCRIPTION" \
            -f target_url="$TARGET_URL"
