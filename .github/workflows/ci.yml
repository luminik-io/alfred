name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: ruff check
        run: uv run --with 'ruff>=0.6' ruff check .
      - name: ruff format check
        run: uv run --with 'ruff>=0.6' ruff format --check .
      - name: mypy
        run: uv run --with 'mypy>=1.10' mypy lib/

  test-python:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --python ${{ matrix.python }} --with pytest --with fastapi --with httpx --with httpx2 pytest tests/ -v

  shellcheck:
    name: shellcheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Remove flaky runner apt sources
        run: |
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \
            \( -iname "*microsoft*" -o -iname "*azure-cli*" \) \
            -print -delete || true
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Find shell scripts
        id: find
        run: |
          {
            echo "files<<EOF"
            find . -type f \
              \( -name "*.sh" -o -name "*.bash" \) \
              ! -path "./site/node_modules/*" \
              ! -path "./.git/*"
            # Also any executable shell-shebang files
            find . -type f -perm -u+x \
              ! -path "./site/node_modules/*" \
              ! -path "./.git/*" \
              -exec sh -c 'head -1 "$1" | grep -qE "^#!.*\b(bash|sh)\b"' _ {} \;
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run shellcheck
        if: steps.find.outputs.files != ''
        run: |
          # shellcheck disable=SC2086
          echo "${{ steps.find.outputs.files }}" | sort -u | while read -r f; do
            [ -z "$f" ] && continue
            echo "==> $f"
            shellcheck -S warning "$f" || exit 1
          done

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Compile every Python file
        run: |
          find . -name "*.py" \
            ! -path "./site/node_modules/*" \
            ! -path "./.git/*" \
            -print0 | xargs -0 -n1 python -m py_compile

  scrub-check:
    name: Alfred cleanliness scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Refuse known-private patterns
        run: bash bin/scrub-check.sh

  public-metadata:
    name: Public PR metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # A squash merge turns the PR title and body into the permanent commit
    # subject and message, so scanning them protects history. Every commit
    # message on the branch is scanned too, in case the PR is not squashed.
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Collect PR commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo "PR_COMMITS<<PR_COMMITS_EOF"
            git log --format=%B "$BASE_SHA..$HEAD_SHA"
            echo "PR_COMMITS_EOF"
          } >> "$GITHUB_ENV"
      - name: Refuse private or raw PR metadata
        run: python bin/public-metadata-check.py

  site-emitter:
    name: Site proof emitter (node:test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22.12.0"
      # The public "% shipped by Alfred agents" headline is computed by the
      # site emitter's attribution rule; these tests lock it to the same
      # label-only, exact-match rule as lib/self_proof.py so the displayed
      # number cannot drift or be gamed by a branch prefix. No deps to install:
      # the module and its tests are dependency-free and run on node:test.
      - name: Test proof emitter attribution + share
        working-directory: site
        run: npm test

  desktop-client:
    name: Desktop client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri

      - name: Remove flaky runner apt sources
        run: |
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \
            \( -iname "*microsoft*" -o -iname "*azure-cli*" \) \
            -print -delete || true

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: clients/desktop
        run: npm ci

      - name: Type-check frontend
        working-directory: clients/desktop
        run: npm run typecheck

      - name: Test frontend (vitest guards)
        working-directory: clients/desktop
        run: npm run test

      - name: Build frontend
        working-directory: clients/desktop
        run: npm run build

      - name: Check Rust formatting
        working-directory: clients/desktop
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test native shell
        working-directory: clients/desktop/src-tauri
        run: cargo test

      - name: Build native shell
        working-directory: clients/desktop
        run: npm run tauri -- build --no-bundle --ci
