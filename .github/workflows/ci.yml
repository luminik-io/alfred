name: CI

on:
  # The push trigger is dropped. Every commit reaches main through a PR
  # (direct pushes to main are forbidden by repo guardrails), so the PR run
  # already gates the exact diff that merges. Re-running the full suite on the
  # merge commit just doubles CI spend. The gitleaks workflow still runs on
  # push to main as the secret-scan safety net.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect whether the heavy Tauri desktop client was touched. Its cargo
  # test/build + frontend build is the most expensive job here and most PRs
  # never touch clients/desktop, so it is gated on an actual change to that
  # tree (or to this workflow). The cheap lint/test/scrub jobs always run.
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'clients/desktop/**'
              - '.github/workflows/ci.yml'

  lint-python:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: ruff check
        run: uv run --with 'ruff>=0.6' ruff check .
      - name: ruff format check
        run: uv run --with 'ruff>=0.6' ruff format --check .
      - name: mypy
        run: uv run --with 'mypy>=1.10' mypy lib/

  test-python:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pre-launch, the fleet runs on a single Python (3.13); there is no
        # external multi-version support commitment yet. Testing only the
        # primary version cuts this job's run count by 3x. Restore the
        # 3.11/3.12 entries here if/when broader version support is promised.
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --python ${{ matrix.python }} --with pytest --with fastapi --with httpx --with httpx2 --with jinja2 pytest tests/ -v

  shellcheck:
    name: shellcheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Find shell scripts
        id: find
        run: |
          {
            echo "files<<EOF"
            find . -type f \
              \( -name "*.sh" -o -name "*.bash" \) \
              ! -path "./site/node_modules/*" \
              ! -path "./.git/*"
            # Also any executable shell-shebang files
            find . -type f -perm -u+x \
              ! -path "./site/node_modules/*" \
              ! -path "./.git/*" \
              -exec sh -c 'head -1 "$1" | grep -qE "^#!.*\b(bash|sh)\b"' _ {} \;
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run shellcheck
        if: steps.find.outputs.files != ''
        run: |
          # shellcheck disable=SC2086
          echo "${{ steps.find.outputs.files }}" | sort -u | while read -r f; do
            [ -z "$f" ] && continue
            echo "==> $f"
            shellcheck -S warning "$f" || exit 1
          done

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Compile every Python file
        run: |
          find . -name "*.py" \
            ! -path "./site/node_modules/*" \
            ! -path "./.git/*" \
            -print0 | xargs -0 -n1 python -m py_compile

  scrub-check:
    name: Alfred cleanliness scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Refuse known-private patterns
        run: bash bin/scrub-check.sh

  desktop-client:
    name: Desktop client
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: clients/desktop
        run: npm ci

      - name: Type-check frontend
        working-directory: clients/desktop
        run: npm run typecheck

      - name: Test frontend (vitest guards)
        working-directory: clients/desktop
        run: npm run test

      - name: Build frontend
        working-directory: clients/desktop
        run: npm run build

      - name: Check Rust formatting
        working-directory: clients/desktop
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test native shell
        working-directory: clients/desktop/src-tauri
        run: cargo test

      - name: Build native shell
        working-directory: clients/desktop
        run: npm run tauri -- build --no-bundle --ci
