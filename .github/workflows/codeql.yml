name: CodeQL

on:
  # The push trigger is dropped: every commit that reaches main has already
  # been analyzed by the pull_request run on the same diff, so re-running on
  # push just doubles the CodeQL spend. The weekly cron still re-scans main
  # against refreshed CodeQL queries.
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only languages with actual source in this repo are analyzed. ruby is
        # dropped: the sole .rb file is Formula/alfred-os.rb, a declarative
        # Homebrew package descriptor with no application/runtime code for
        # CodeQL to find vulnerabilities in. actions (workflow YAML),
        # javascript-typescript (desktop client + Astro site), and python (lib/)
        # all have real code and stay.
        language:
          - actions
          - javascript-typescript
          - python

    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
